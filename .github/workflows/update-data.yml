name: Update Commodity Dashboard Data

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours, Monday to Friday
    # GitHub cron uses UTC.
    # Singapore time = UTC + 8.
    - cron: "30 */4 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show repo structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest commodity data
        run: python scripts/fetch_data.py

      - name: Show generated data status
        run: |
          ls -la data
          python -m json.tool data/commodities.json > /tmp/commodities_check.json
          head -40 data/commodities.json
          git status --short

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/commodities.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update commodity dashboard data"
            git push
          fi
